name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/models.py
          python -m py_compile backend/app/schemas.py
          python -m py_compile backend/app/database.py
          echo "Build OK"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - - name: Run tests
          run: |
            cd backend
            echo "DATABASE_URL=$DATABASE_URL"
            python -c "from app.database import DATABASE_URL; print('DB URL:', DATABASE_URL)"
            pytest tests/ -v --cov=app --cov-report=xml:coverage.xml
          env:
            DATABASE_URL: ""

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  sonar:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate coverage for Sonar
        run: |
          pip install -r